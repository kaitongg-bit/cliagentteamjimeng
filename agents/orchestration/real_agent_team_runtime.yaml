runtime: real_agent_team
version: 0.1.0

principles:
  - independent_context
  - independent_artifacts
  - explicit_orchestration
  - human_in_the_loop
  - decision_traceability

agent_spec:
  spec_directory: agents/specs
  canonical_external_skills:
    screenwriter:
      path: /Users/bytedance/Downloads/screenwriting-master.skill
      reason: 编剧 Agent 和剧本医生 Agent 的完整方法论来源。
  required_fields:
    - id
    - role
    - goal
    - input_selector
    - output_schema
    - token_budget
    - dependencies

artifact_store:
  path_template: runs/{run_id}/{stage_id}/{agent_id}.{ext}
  metadata:
    - run_id
    - stage_id
    - agent_id
    - model
    - token_budget
    - input_artifacts
    - output_artifact
    - created_at

stages:
  - id: concept_debate
    execution: parallel_then_synthesis
    agents:
      - id: screenwriter
        role: develop 3 story continuations
        spec: agents/specs/screenwriter.yaml
        input_selector:
          - brief
          - user_story_seed
        output_schema:
          - options
          - strongest_option
          - unresolved_questions
        token_budget: medium
        dependencies: []

      - id: opposition_writer
        role: attack cliches and logic risks
        spec: agents/specs/opposition_writer.yaml
        input_selector:
          - brief
          - user_story_seed
        output_schema:
          - risks
          - strongest_objection
          - must_fix
        token_budget: medium
        dependencies: []

      - id: audience_panel
        role: predict audience comprehension and desire
        spec: agents/specs/audience_panel.yaml
        input_selector:
          - brief
          - user_story_seed
        output_schema:
          - what_i_understand
          - confusion_points
          - watch_desire
          - memorability
        token_budget: low
        dependencies: []

    synthesis:
      agent: showrunner
      human_gate: true
      outputs:
        - concept_decision_log.md
        - next_round_brief.md

  - id: script_revision
    execution: parallel_review_then_revision
    agents:
      - id: screenwriter
        spec: agents/specs/screenwriter.yaml
      - id: script_doctor
        spec: agents/specs/script_doctor.yaml
      - id: audience_panel
        spec: agents/specs/audience_panel.yaml
    synthesis:
      agent: showrunner
      spec: agents/specs/showrunner.yaml
      human_gate: true

  - id: visual_development
    execution: human_assisted
    agents:
      - id: visual_concept_designer
        spec: agents/specs/visual_concept_designer.yaml
      - id: style_curator
        spec: agents/specs/visual_concept_designer.yaml
      - id: cinematographer
        spec: agents/specs/cinematographer.yaml
    human_inputs:
      - style_skill_output
      - reference_films
      - screenshot_notes

  - id: prompt_generation
    execution: sequential_review
    agents:
      - id: prompt_structurer
        spec: agents/specs/prompt_structurer.yaml
      - id: prompt_compliance_reviewer
        spec: agents/specs/prompt_compliance_reviewer.yaml
      - id: critic
        spec: agents/specs/critic.yaml
    human_gate: true
